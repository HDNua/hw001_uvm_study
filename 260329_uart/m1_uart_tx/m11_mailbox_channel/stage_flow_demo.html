<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>m11_mailbox_channel Flow Demo</title>
<link rel="stylesheet" href="../stage_flow.css" />
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 id="stageTitle"></h1>
      <p class="headline" id="stageHeadline"></p>
    </div>
    <div class="top-actions" id="topActions"></div>
  </header>

  <div class="layout">
    <aside class="panel side">
      <h2>Focus</h2>
      <div class="focus-card">
        <strong id="focusLabel"></strong>
        <p id="focusSummary"></p>
      </div>
      <div class="focus-list section-gap" id="focusList"></div>

      <div class="section-gap">
        <h2>Flow Step</h2>
        <div class="step-list" id="stepList"></div>
      </div>
    </aside>

    <main class="main">
      <section class="panel board-shell">
        <div class="board-scroll">
          <div class="board" id="board">

            <div class="payload-row" id="payloadRow"></div>
          </div>
        </div>
      </section>

      <section class="below">
        <div class="detail-card">
          <strong id="detailTitle"></strong>
          <p id="detailBody"></p>
        </div>
        <div class="detail-card">
          <strong>Code Focus</strong>

          <pre id="codeBlock"></pre>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
window.STAGE = {
  title: "m11_mailbox_channel",
  headline: "queue + event handoffлҘј typed SystemVerilog mailboxлЎң көҗмІҙн•ңлӢӨ.",
  focusLabel: "мқҙм „ лӢЁкі„ лҢҖл№„",
  focusSummary: "m10_uvc_block лҢҖл№„: м—ӯн• кіј нҸҙлҚ” кө¬мЎ°лҠ” мң м§Җн•ҳкі  м„ё transaction кІҪлЎңлҘј mailbox put/getмңјлЎң л°”кҫјлӢӨ.",
  navLinks: [
    { label: "лӘ©м°Ё", href: "../index.html" },
    { label: "UART TX лҸҷмһ‘ лҚ°лӘЁ", href: "../uart_tx_demo.html" },
    { label: "вҶҗ m10", href: "../m10_uvc_block/stage_flow_demo.html" },
    { label: "m12 вҶ’", href: "../m12_sv_class_uvc/stage_flow_demo.html" }
  ],
  focus: [
    "sequenceлҠ” uart_tx_seq_itemмқ„ driverмҷҖ expected mailboxм—җ putн•ңлӢӨ.",
    "driverмҷҖ scoreboardлҠ” mailbox.get()м—җм„ң itemмқҙ лҸ„м°©н•  л•Ңк№Ңм§Җ мһҗм—°мҠӨлҹҪкІҢ blockлҗңлӢӨ.",
    "monitorлҸ„ actual byteлҘј itemмңјлЎң к°җмӢё mailboxм—җ м „лӢ¬н•ҳлҜҖлЎң м„ё кІҪлЎңк°Җ к°ҷмқҖ transaction лӢЁмң„лҘј мӮ¬мҡ©н•ңлӢӨ."
  ],
  nodes: [
    { id: "sequence", title: "sequence", text: "driverВ·expected item мғқм„ұ", x: 4, y: 15, w: 17, h: 13, tone: "amber" },
    { id: "drv_mbx", title: "driver mailbox", text: "mailbox #(uart_tx_seq_item)", x: 28, y: 15, w: 20, h: 13, tone: "blue" },
    { id: "driver", title: "driver", text: "blocking get нӣ„ DUT кө¬лҸҷ", x: 55, y: 15, w: 17, h: 13, tone: "rose" },
    { id: "interface", title: "uart_tx_if", text: "UART TX pin bundle", x: 79, y: 31, w: 16, h: 13, tone: "slate" },
    { id: "monitor", title: "monitor", text: "actual item мғқм„ұ", x: 58, y: 58, w: 16, h: 13, tone: "green" },
    { id: "mon_mbx", title: "actual mailbox", text: "monitor вҶ’ scoreboard", x: 34, y: 58, w: 17, h: 13, tone: "teal" },
    { id: "scoreboard", title: "scoreboard", text: "expectedВ·actual get л№„көҗ", x: 4, y: 61, w: 20, h: 13, tone: "green" },
    { id: "exp_mbx", title: "expected mailbox", text: "sequence вҶ’ scoreboard", x: 4, y: 37, w: 20, h: 13, tone: "violet" }
  ],
  wires: [
    { id: "sequence_drv_mbx", from: "sequence", to: "drv_mbx" },
    { id: "drv_mbx_driver", from: "drv_mbx", to: "driver" },
    { id: "driver_interface", from: "driver", to: "interface" },
    { id: "interface_monitor", from: "interface", to: "monitor" },
    { id: "monitor_mon_mbx", from: "monitor", to: "mon_mbx" },
    { id: "mon_mbx_scoreboard", from: "mon_mbx", to: "scoreboard" },
    { id: "sequence_exp_mbx", from: "sequence", to: "exp_mbx" },
    { id: "exp_mbx_scoreboard", from: "exp_mbx", to: "scoreboard" }
  ],
  steps: [
    {
      title: "typed mailbox put",
      body: "sequenceк°Җ л§Ңл“  sequence item к°қмІҙлҘј driver mailboxмҷҖ expected mailboxм—җ к°Ғк°Ғ л„ЈлҠ”лӢӨ.",
      activeNodes: ["sequence", "drv_mbx", "exp_mbx"],
      activeWires: ["sequence_drv_mbx", "sequence_exp_mbx"],
      code: "r_DrvMbx.put(driver_item);\nr_ExpMbx.put(expected_item);",
      packetWire: "sequence_drv_mbx",
      packet: "item 48"
    },
    {
      title: "blocking get",
      body: "driverлҠ” лі„лҸ„мқҳ queue empty кІҖмӮ¬лӮҳ event лҢҖкё° м—Ҷмқҙ mailbox.get()м—җм„ң itemмқ„ кё°лӢӨлҰ°лӢӨ.",
      activeNodes: ["drv_mbx", "driver", "interface"],
      activeWires: ["drv_mbx_driver", "driver_interface"],
      code: "r_DrvMbx.get(item);\nI_UART_TxIf.r_TxData <= item.data;",
      packetWire: "drv_mbx_driver",
      packet: "item 48"
    },
    {
      title: "actual item м „лӢ¬",
      body: "monitorк°Җ ліөмӣҗн•ң actual byteлҸ„ sequence itemмңјлЎң к°җмӢё actual mailboxм—җ л„ЈлҠ”лӢӨ.",
      activeNodes: ["interface", "monitor", "mon_mbx"],
      activeWires: ["interface_monitor", "monitor_mon_mbx"],
      code: "item = new(r_Captured);\nr_MonMbx.put(item);",
      packetWire: "monitor_mon_mbx",
      packet: "item 48"
    },
    {
      title: "л‘җ mailbox л№„көҗ",
      body: "scoreboardлҠ” expectedмҷҖ actual mailboxм—җм„ң itemмқ„ н•ҳлӮҳм”© blocking getн•ҙ dataлҘј л№„көҗн•ңлӢӨ.",
      activeNodes: ["exp_mbx", "mon_mbx", "scoreboard"],
      activeWires: ["exp_mbx_scoreboard", "mon_mbx_scoreboard"],
      code: "r_ExpMbx.get(expected);\nr_MonMbx.get(actual);\nif (actual.data === expected.data)",
      packetWire: "mon_mbx_scoreboard",
      packet: "PASS"
    }
  ],
  snippet: "uvc/uart_tx/uart_tx_sequencer.sv",
  payload: ["48", "65", "6c", "6c", "6f"]
};
</script>
<script src="../stage_flow.js"></script>
