<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>m01_pure Flow Demo</title>
<link rel="stylesheet" href="../stage_flow.css" />
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 id="stageTitle"></h1>
      <p class="headline" id="stageHeadline"></p>
    </div>
    <div class="top-actions" id="topActions"></div>
  </header>

  <div class="layout">
    <aside class="panel side">
      <h2>Focus</h2>
      <div class="focus-card">
        <strong id="focusLabel"></strong>
        <p id="focusSummary"></p>
      </div>
      <div class="focus-list section-gap" id="focusList"></div>

      <div class="section-gap">
        <h2>Flow Step</h2>
        <div class="step-list" id="stepList"></div>
      </div>
    </aside>

    <main class="main">
      <section class="panel board-shell">
        <div class="board-scroll">
          <div class="board" id="board">
            <div class="lane-label">STIMULUS / STRUCTURE</div>
            <div class="lane-label check">OBSERVE / CHECK</div>
            <svg class="wire-layer" id="wireLayer" aria-hidden="true"></svg>
            <div id="nodes"></div>
            <div class="packet" id="packet"></div>
            <div class="payload-row" id="payloadRow"></div>
          </div>
        </div>
      </section>

      <section class="below">
        <div class="detail-card">
          <strong id="detailTitle"></strong>
          <p id="detailBody"></p>
        </div>
        <div class="detail-card">
          <strong>Code Focus</strong>
          <p>관련 파일: <span id="snippetName"></span></p>
          <pre id="codeBlock"></pre>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
window.STAGE = {
  title: "m01_pure",
  headline: "한 initial 블록에서 UART TX를 직접 구동하고 직접 확인한다.",
  focusLabel: "핵심 목표",
  focusSummary: "테스트벤치가 DUT를 직접 구동하고 결과를 직접 확인한다.",
  navLinks: [
    { label: "목차", href: "../index.html" },
    { label: "UART TX 동작 데모", href: "../uart_tx_demo.html" },
    { label: "m02 →", href: "../m02_task/stage_flow_demo.html" }
  ],
  focus: [
    "TB_Top이 DUT pin을 직접 잡고 한 바이트를 보낸다.",
    "send와 receive/check 코드가 아직 같은 흐름 안에 있다.",
    "구조는 가장 짧지만 역할 경계가 거의 보이지 않는다."
  ],
  nodes: [
    { id: "tb", title: "TB_Top initial", text: "clock/reset, stimulus, check가 한 파일 안에 모여 있음", x: 5, y: 20, w: 20, h: 14, tone: "violet" },
    { id: "drive", title: "inline drive", text: "r_TxData/r_TxValid를 직접 토글", x: 32, y: 20, w: 17, h: 14, tone: "rose" },
    { id: "dut", title: "UART_Tx DUT", text: "byte를 serial waveform으로 변환", x: 58, y: 20, w: 17, h: 14, tone: "cyan" },
    { id: "check", title: "inline capture/check", text: "w_TxSerial을 직접 샘플링하고 expected와 비교", x: 78, y: 20, w: 17, h: 14, tone: "green" },
    { id: "wave", title: "XSim waveform", text: "run_xsim.ps1이 전체 계층 파형을 WDB로 기록", x: 39, y: 58, w: 22, h: 12, tone: "slate" }
  ],
  wires: [
    { id: "tb_drive", from: "tb", to: "drive" },
    { id: "drive_dut", from: "drive", to: "dut" },
    { id: "dut_check", from: "dut", to: "check" },
    { id: "dut_wave", from: "dut", to: "wave" }
  ],
  steps: [
    {
      title: "테스트 시작",
      body: "TB_Top initial 블록이 reset을 걸고 모든 동작을 직접 순서대로 호출한다.",
      activeNodes: ["tb"],
      activeWires: [],
      code: "initial begin\n    reset...\n    drive...\n    capture...\nend",
      packetWire: null,
      packet: ""
    },
    {
      title: "직접 구동",
      body: "DUT 입력 pin을 testbench 코드가 바로 바꾼다.",
      activeNodes: ["tb", "drive"],
      activeWires: ["tb_drive"],
      code: "r_TxData  = 8'h48;\nr_TxValid = 1'b1;",
      packetWire: "tb_drive",
      packet: "48"
    },
    {
      title: "DUT 변환",
      body: "UART_Tx는 parallel byte를 serial bit stream으로 내보낸다.",
      activeNodes: ["drive", "dut"],
      activeWires: ["drive_dut"],
      code: "UART_Tx I_UART_Tx (...);",
      packetWire: "drive_dut",
      packet: "48"
    },
    {
      title: "직접 확인",
      body: "수신과 비교도 같은 testbench 코드가 수행한다.",
      activeNodes: ["dut", "check"],
      activeWires: ["dut_check"],
      code: "if (r_Captured == 8'h48)\n    $display(\"PASS\");",
      packetWire: "dut_check",
      packet: "48"
    }
  ],
  snippet: "tb_top_v1.sv",
  payload: ["48", "65", "6c", "6c", "6f"]
};
</script>
<script src="../stage_flow.js"></script>
</body>
</html>
