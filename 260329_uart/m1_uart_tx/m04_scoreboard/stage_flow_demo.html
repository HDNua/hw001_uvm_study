<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>m04_scoreboard Flow Demo</title>
<link rel="stylesheet" href="../stage_flow.css" />
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 id="stageTitle"></h1>
      <p class="headline" id="stageHeadline"></p>
    </div>
    <div class="top-actions" id="topActions"></div>
  </header>

  <div class="layout">
    <aside class="panel side">
      <h2>Focus</h2>
      <div class="focus-card">
        <strong id="focusLabel"></strong>
        <p id="focusSummary"></p>
      </div>
      <div class="focus-list section-gap" id="focusList"></div>

      <div class="section-gap">
        <h2>Flow Step</h2>
        <div class="step-list" id="stepList"></div>
      </div>
    </aside>

    <main class="main">
      <section class="panel board-shell">
        <div class="board-scroll">
          <div class="board" id="board">
            <div class="lane-label">STIMULUS / STRUCTURE</div>
            <div class="lane-label check">OBSERVE / CHECK</div>
            <svg class="wire-layer" id="wireLayer" aria-hidden="true"></svg>
            <div id="nodes"></div>
            <div class="packet" id="packet"></div>
            <div class="payload-row" id="payloadRow"></div>
          </div>
        </div>
      </section>

      <section class="below">
        <div class="detail-card">
          <strong id="detailTitle"></strong>
          <p id="detailBody"></p>
        </div>
        <div class="detail-card">
          <strong>Code Focus</strong>
          <p>관련 파일: <span id="snippetName"></span></p>
          <pre id="codeBlock"></pre>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
window.STAGE = {
  title: "m04_scoreboard",
  headline: "비교 책임을 scoreboard task로 분리한다.",
  focusLabel: "이전 단계 대비",
  focusSummary: "m03_fork 대비: monitor가 직접 비교하지 않고 scoreboard 역할이 생긴다.",
  navLinks: [
    { label: "목차", href: "../index.html" },
    { label: "UART TX 동작 데모", href: "../uart_tx_demo.html" },
    { label: "← m03", href: "../m03_fork/stage_flow_demo.html" }
  ],
  focus: [
    "driver, monitor, scoreboard라는 검증 3역할이 처음 보인다.",
    "actual은 공유 변수와 event로, expected는 scoreboard 내부 queue로 전달한다.",
    "다음 단계에서 monitor와 scoreboard 사이의 queue handoff가 필요한 이유가 드러난다."
  ],
  nodes: [
    { id: "test", title: "TB_Top", text: "payload와 expected를 준비", x: 5, y: 18, w: 18, h: 13, tone: "violet" },
    { id: "driver", title: "driver task", text: "DUT 입력 구동", x: 31, y: 18, w: 18, h: 13, tone: "rose" },
    { id: "dut", title: "UART_Tx DUT", text: "serial output 생성", x: 57, y: 18, w: 16, h: 13, tone: "cyan" },
    { id: "monitor", title: "monitor task", text: "actual byte 복원", x: 78, y: 18, w: 17, h: 13, tone: "green" },
    { id: "scoreboard", title: "scoreboard task", text: "expected와 actual 비교", x: 45, y: 58, w: 23, h: 14, tone: "green" },
    { id: "expected", title: "expected data", text: "payload에서 기대값 생성", x: 15, y: 58, w: 20, h: 13, tone: "amber" }
  ],
  wires: [
    { id: "test_driver", from: "test", to: "driver" },
    { id: "driver_dut", from: "driver", to: "dut" },
    { id: "dut_monitor", from: "dut", to: "monitor" },
    { id: "monitor_scoreboard", from: "monitor", to: "scoreboard" },
    { id: "expected_scoreboard", from: "expected", to: "scoreboard" }
  ],
  steps: [
    {
      title: "역할 분리",
      body: "driver, monitor, check가 한 덩어리에서 별도 task 역할로 나뉜다.",
      activeNodes: ["driver", "monitor", "scoreboard"],
      activeWires: [],
      code: "task uart_scoreboard(input int num_bytes);",
      packetWire: null,
      packet: ""
    },
    {
      title: "actual 생성",
      body: "monitor는 DUT serial output을 actual byte로 복원한다.",
      activeNodes: ["dut", "monitor"],
      activeWires: ["dut_monitor"],
      code: "recv_byte();",
      packetWire: "dut_monitor",
      packet: "48"
    },
    {
      title: "expected 준비",
      body: "scoreboard는 payload를 직접 참조해 expected queue를 준비한다.",
      activeNodes: ["test", "expected"],
      activeWires: [],
      code: "foreach (r_Payload[r_ByteIdx])\n    r_ExpectedQ.push_back(r_Payload[r_ByteIdx]);",
      packetWire: null,
      packet: ""
    },
    {
      title: "scoreboard 비교",
      body: "monitor가 event를 발생시키면 scoreboard가 actual과 expected를 비교한다.",
      activeNodes: ["monitor", "expected", "scoreboard"],
      activeWires: ["monitor_scoreboard", "expected_scoreboard"],
      code: "if (r_Actual === r_Expected)\n    r_PassCnt++;",
      packetWire: null,
      packet: ""
    }
  ],
  snippet: "tb_top_v4.sv",
  payload: ["48", "65", "6c", "6c", "6f"]
};
</script>
<script src="../stage_flow.js"></script>
</body>
</html>
