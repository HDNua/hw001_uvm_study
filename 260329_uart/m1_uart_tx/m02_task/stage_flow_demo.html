<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>m02_task Flow Demo</title>
<link rel="stylesheet" href="../stage_flow.css" />
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 id="stageTitle"></h1>
      <p class="headline" id="stageHeadline"></p>
    </div>
    <div class="top-actions" id="topActions"></div>
  </header>

  <div class="layout">
    <aside class="panel side">
      <h2>Focus</h2>
      <div class="focus-card">
        <strong id="focusLabel"></strong>
        <p id="focusSummary"></p>
      </div>
      <div class="focus-list section-gap" id="focusList"></div>

      <div class="section-gap">
        <h2>Flow Step</h2>
        <div class="step-list" id="stepList"></div>
      </div>
    </aside>

    <main class="main">
      <section class="panel board-shell">
        <div class="board-scroll">
          <div class="board" id="board">
            <div class="lane-label">STIMULUS / STRUCTURE</div>
            <div class="lane-label check">OBSERVE / CHECK</div>
            <svg class="wire-layer" id="wireLayer" aria-hidden="true"></svg>
            <div id="nodes"></div>
            <div class="packet" id="packet"></div>
            <div class="payload-row" id="payloadRow"></div>
          </div>
        </div>
      </section>

      <section class="below">
        <div class="detail-card">
          <strong id="detailTitle"></strong>
          <p id="detailBody"></p>
        </div>
        <div class="detail-card">
          <strong>Code Focus</strong>
          <p>관련 파일: <span id="snippetName"></span></p>
          <pre id="codeBlock"></pre>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
window.STAGE = {
  title: "m02_task",
  headline: "반복되는 drive와 receive 코드를 task로 빼서 이름을 붙인다.",
  focusLabel: "이전 단계 대비",
  focusSummary: "m01_pure 대비: inline 코드가 send_byte / recv_byte task로 분리된다.",
  navLinks: [
    { label: "목차", href: "../index.html" },
    { label: "UART TX 동작 데모", href: "../uart_tx_demo.html" },
    { label: "← m01", href: "../m01_pure/stage_flow_demo.html" }
  ],
  focus: [
    "task 이름이 역할의 첫 경계가 된다.",
    "send_byte는 전송 요청만 등록하고 recv_byte가 이어서 직렬 출력을 듣는다.",
    "호출은 여전히 순차라서 여러 바이트의 동시 구동과 감시에는 아직 부족하다."
  ],
  nodes: [
    { id: "test", title: "TB_Top initial", text: "payload를 고르고 task를 순차 호출", x: 5, y: 18, w: 20, h: 14, tone: "violet" },
    { id: "send", title: "send_byte task", text: "r_TxData/r_TxValid 구동 코드를 캡슐화", x: 33, y: 18, w: 18, h: 14, tone: "rose" },
    { id: "dut", title: "UART_Tx DUT", text: "serial waveform 생성", x: 60, y: 18, w: 17, h: 14, tone: "cyan" },
    { id: "recv", title: "recv_byte task", text: "w_TxSerial을 byte로 복원", x: 80, y: 18, w: 16, h: 14, tone: "green" },
    { id: "check", title: "inline compare", text: "수신 결과를 expected와 비교", x: 58, y: 58, w: 20, h: 12, tone: "green" }
  ],
  wires: [
    { id: "test_send", from: "test", to: "send" },
    { id: "send_dut", from: "send", to: "dut" },
    { id: "dut_recv", from: "dut", to: "recv" },
    { id: "recv_check", from: "recv", to: "check" }
  ],
  steps: [
    {
      title: "task 호출",
      body: "TB_Top은 자세한 pin 토글 대신 이름 붙은 task를 호출한다.",
      activeNodes: ["test", "send"],
      activeWires: ["test_send"],
      code: "send_byte(8'h48);",
      packetWire: "test_send",
      packet: "48"
    },
    {
      title: "구동 캡슐화",
      body: "send_byte 안에 valid handshake와 data 구동이 모인다.",
      activeNodes: ["send", "dut"],
      activeWires: ["send_dut"],
      code: "task send_byte(input logic [7:0] data);\n    ...\nendtask",
      packetWire: "send_dut",
      packet: "48"
    },
    {
      title: "수신 캡슐화",
      body: "recv_byte는 serial output을 다시 byte로 복원한다.",
      activeNodes: ["dut", "recv"],
      activeWires: ["dut_recv"],
      code: "task recv_byte(output logic [7:0] captured);\n    ...\nendtask",
      packetWire: "dut_recv",
      packet: "48"
    },
    {
      title: "아직 순차",
      body: "한 바이트는 확인할 수 있지만 여러 바이트를 구동하면서 동시에 감시할 수는 없다.",
      activeNodes: ["test", "send", "recv", "check"],
      activeWires: ["recv_check"],
      code: "send_byte(8'h48);\nrecv_byte(r_Captured);",
      packetWire: null,
      packet: ""
    }
  ],
  snippet: "tb_top_v2.sv",
  payload: ["48", "65", "6c", "6c", "6f"]
};
</script>
<script src="../stage_flow.js"></script>
</body>
</html>
