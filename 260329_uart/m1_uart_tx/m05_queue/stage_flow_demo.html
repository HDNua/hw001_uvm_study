<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>m05_queue Flow Demo</title>
<link rel="stylesheet" href="../stage_flow.css" />
</head>
<body>
<div class="wrap">

    </div>
    <div class="top-actions" id="topActions"></div>

  <div class="layout">

      <div class="focus-card">

        </div>
      </section>

      <section class="below">

  </div>
</div>

<script>
window.STAGE = {

  navLinks: [
    { label: "лӘ©м°Ё", href: "../index.html" },

    { label: "вҶҗ m04", href: "../m04_scoreboard/stage_flow_demo.html" },

      body: "scoreboardлҠ” eventлҘј кё°лӢӨлҰ° л’Ө к°ҖмһҘ лЁјм Җ л“Өм–ҙмҳЁ actualл¶Җн„° кәјлӮёлӢӨ.",
