<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>m05_queue Flow Demo</title>
<link rel="stylesheet" href="../stage_flow.css" />
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 id="stageTitle"></h1>
      <p class="headline" id="stageHeadline"></p>
    </div>
    <div class="top-actions" id="topActions"></div>
  </header>

  <div class="layout">
    <aside class="panel side">
      <h2>Focus</h2>
      <div class="focus-card">
        <strong id="focusLabel"></strong>
        <p id="focusSummary"></p>
      </div>
      <div class="focus-list section-gap" id="focusList"></div>

      <div class="section-gap">
        <h2>Flow Step</h2>
        <div class="step-list" id="stepList"></div>
      </div>
    </aside>

    <main class="main">
      <section class="panel board-shell">
        <div class="board-scroll">
          <div class="board" id="board">
            <div class="lane-label">STIMULUS / STRUCTURE</div>
            <div class="lane-label check">OBSERVE / CHECK</div>
            <svg class="wire-layer" id="wireLayer" aria-hidden="true"></svg>
            <div id="nodes"></div>
            <div class="packet" id="packet"></div>
            <div class="payload-row" id="payloadRow"></div>
          </div>
        </div>
      </section>

      <section class="below">
        <div class="detail-card">
          <strong id="detailTitle"></strong>
          <p id="detailBody"></p>
        </div>
        <div class="detail-card">
          <strong>Code Focus</strong>
          <p>관련 파일: <span id="snippetName"></span></p>
          <pre id="codeBlock"></pre>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
window.STAGE = {
  title: "m05_queue",
  headline: "actual 전달을 queue + event handoff로 바꾼다.",
  focusLabel: "이전 단계 대비",
  focusSummary: "m04_scoreboard 대비: monitor와 scoreboard 사이의 단일 공유 변수를 queue로 교체한다.",
  navLinks: [
    { label: "목차", href: "../index.html" },
    { label: "UART TX 동작 데모", href: "../uart_tx_demo.html" },
    { label: "← m04", href: "../m04_scoreboard/stage_flow_demo.html" }
  ],
  focus: [
    "monitor는 actual byte를 r_MonQ에 push하고 event를 발생시킨다.",
    "scoreboard는 queue에서 actual을 순서대로 pop해 단일 공유 변수의 덮어쓰기 위험을 없앤다.",
    "driver와 expected는 아직 payload를 직접 참조하므로 다음에는 sequence 역할이 필요하다."
  ],
  nodes: [
    { id: "test", title: "TB_Top", text: "payload와 expected를 준비", x: 4, y: 18, w: 15, h: 13, tone: "violet" },
    { id: "driver", title: "driver task", text: "DUT 입력 구동", x: 23, y: 18, w: 15, h: 13, tone: "rose" },
    { id: "dut", title: "UART_Tx DUT", text: "serial output 생성", x: 43, y: 18, w: 15, h: 13, tone: "cyan" },
    { id: "monitor", title: "monitor task", text: "actual byte 복원", x: 63, y: 18, w: 15, h: 13, tone: "green" },
    { id: "queue", title: "r_MonQ + event", text: "actual byte를 순서대로 보관", x: 82, y: 18, w: 14, h: 13, tone: "slate" },
    { id: "scoreboard", title: "scoreboard task", text: "queue에서 pop해 expected와 비교", x: 49, y: 58, w: 25, h: 14, tone: "green" },
    { id: "expected", title: "expected data", text: "payload에서 기대값 생성", x: 17, y: 58, w: 20, h: 13, tone: "amber" }
  ],
  wires: [
    { id: "test_driver", from: "test", to: "driver" },
    { id: "driver_dut", from: "driver", to: "dut" },
    { id: "dut_monitor", from: "dut", to: "monitor" },
    { id: "monitor_queue", from: "monitor", to: "queue" },
    { id: "queue_scoreboard", from: "queue", to: "scoreboard" },
    { id: "expected_scoreboard", from: "expected", to: "scoreboard" }
  ],
  steps: [
    {
      title: "actual 복원",
      body: "monitor는 DUT serial output을 actual byte로 복원하지만 직접 비교하지 않는다.",
      activeNodes: ["dut", "monitor"],
      activeWires: ["dut_monitor"],
      code: "recv_byte();",
      packetWire: "dut_monitor",
      packet: "48"
    },
    {
      title: "queue push",
      body: "monitor는 복원한 actual을 queue 뒤에 넣고 event로 scoreboard를 깨운다.",
      activeNodes: ["monitor", "queue"],
      activeWires: ["monitor_queue"],
      code: "r_MonQ.push_back(r_Captured);\n-> e_MonDataReady;",
      packetWire: "monitor_queue",
      packet: "48"
    },
    {
      title: "queue pop",
      body: "scoreboard는 event를 기다린 뒤 가장 먼저 들어온 actual부터 꺼낸다.",
      activeNodes: ["queue", "scoreboard"],
      activeWires: ["queue_scoreboard"],
      code: "@(e_MonDataReady);\nr_Actual = r_MonQ.pop_front();",
      packetWire: "queue_scoreboard",
      packet: "48"
    },
    {
      title: "scoreboard 비교",
      body: "expected path와 queue를 거친 actual path가 scoreboard에서 만난다.",
      activeNodes: ["expected", "scoreboard"],
      activeWires: ["expected_scoreboard"],
      code: "if (r_Actual === r_Expected)\n    r_PassCnt++;",
      packetWire: null,
      packet: ""
    }
  ],
  snippet: "tb_top_v5.sv",
  payload: ["48", "65", "6c", "6c", "6f"]
};
</script>
<script src="../stage_flow.js"></script>
</body>
</html>
